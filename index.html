<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" id="screen" type="text/css" href="default.css">
        <link rel="stylesheet" id="palette" type="text/css" href="colors.css">

        <title>Smart Cookie AI</title>

        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
    </head>
    <body>
        <h1>Welcome to Smart Cookie AI! 🚀</h1>
        <div class = "paintchipgrid">
            <div class = "paintchip" style="background-color: var(--keyColor)"></div>

            <div class = "paintchip" style="background-color: var(--primary)"></div>
            <div class = "paintchip" style="background-color: var(--onPrimary)"></div>
            <div class = "paintchip" style="background-color: var(--secondary)"></div>
            <div class = "paintchip" style="background-color: var(--onSecondary)"></div>
            <div class = "paintchip" style="background-color: var(--tertiary)"></div>
            <div class = "paintchip" style="background-color: var(--onTertiary)"></div>

            <div class = "paintchip" style="background-color: var(--background)"></div>
            <div class = "paintchip" style="background-color: var(--onBackground)"></div>
            <div class = "paintchip" style="background-color: var(--surface)"></div>
            <div class = "paintchip" style="background-color: var(--onSurface)"></div>
            <div class = "paintchip" style="background-color: var(--error)"></div>
            <div class = "paintchip" style="background-color: var(--onError)"></div>

            <div class = "paintchip" style="background-color: var(--green)"></div>
            <div class = "paintchip" style="background-color: var(--onGreen)"></div>
            <div class = "paintchip" style="background-color: var(--yellow)"></div>
            <div class = "paintchip" style="background-color: var(--onYellow)"></div>
            <div class = "paintchip" style="background-color: var(--orange)"></div>
            <div class = "paintchip" style="background-color: var(--onOrange)"></div>
            <div class = "paintchip" style="background-color: var(--red)"></div>
            <div class = "paintchip" style="background-color: var(--onRed)"></div>
        </div>

        <svg width="24" height="24" viewBox="0 0 24 24" fill="var(--onBackground)" xmlns="http://www.w3.org/2000/svg">
            <path d="M5.9545 5.95548C6.39384 5.51614 7.10616 5.51614 7.5455 5.95548L11.999 10.409L16.4524 5.95561C16.8918 5.51627 17.6041 5.51627 18.0434 5.95561C18.4827 6.39495 18.4827 7.10726 18.0434 7.5466L13.59 12L18.0434 16.4534C18.4827 16.8927 18.4827 17.605 18.0434 18.0444C17.6041 18.4837 16.8918 18.4837 16.4524 18.0444L11.999 13.591L7.5455 18.0445C7.10616 18.4839 6.39384 18.4839 5.9545 18.0445C5.51517 17.6052 5.51516 16.8929 5.9545 16.4535L10.408 12L5.9545 7.54647C5.51516 7.10713 5.51517 6.39482 5.9545 5.95548Z" fill="var(--onBackground)"/>
        </svg>
        <svg width="25" height="24" viewBox="0 0 25 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M15.2335 5.21967C15.5263 5.51256 15.5263 5.98744 15.2335 6.28033L9.51379 12L15.2335 17.7197C15.5263 18.0126 15.5263 18.4874 15.2335 18.7803C14.9406 19.0732 14.4657 19.0732 14.1728 18.7803L7.92279 12.5303C7.6299 12.2374 7.6299 11.7626 7.92279 11.4697L14.1728 5.21967C14.4657 4.92678 14.9406 4.92678 15.2335 5.21967Z" fill="var(--onBackground)"/>
        </svg>

        <h1 class = "big">Enter your API key:</h1>

        <div class = "layout">
            <div class = "sidebar">
                <h1 class = "big">Sidebar</h1>
            </div>
            <div class = "main">
                <div class = "top">
                    <h1 class = "big">Please enter your API key:</h1>
                    <h1 id = "apikey" contenteditable = "true" class = "tempeditable">MYAPIKEY</h1>
                    <button id = "testButton">"SEND" A MESSAGE!</button>
                </div>
                <div class = "chat">
                    <h1 id = "test" class = "big"></h1>
                </div>
                <div class = "bottom">
                    <h1 id = "input" contenteditable = "true" class = "big">Type your message here...</h1>
                </div>
            </div>
        </div>

        <script type="text/javascript" src="model.js"></script>
        <script type="text/javascript" src="viewModel.js"></script>
    </body>
</html>
