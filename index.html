<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" id="screen" type="text/css" href="default.css">
        <link rel="stylesheet" id="palette" type="text/css" href="colors.css">

        <title>Smart Cookie AI</title>

        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
    </head>
    <body>
        <h1>Hello! My site is working.</h1>
        <div class = "paintchipgrid">
            <div class = "paintchip" style="background-color: var(--keyColor)"></div>

            <div class = "paintchip" style="background-color: var(--primary)"></div>
            <div class = "paintchip" style="background-color: var(--onPrimary)"></div>
            <div class = "paintchip" style="background-color: var(--secondary)"></div>
            <div class = "paintchip" style="background-color: var(--onSecondary)"></div>
            <div class = "paintchip" style="background-color: var(--tertiary)"></div>
            <div class = "paintchip" style="background-color: var(--onTertiary)"></div>

            <div class = "paintchip" style="background-color: var(--background)"></div>
            <div class = "paintchip" style="background-color: var(--onBackground)"></div>
            <div class = "paintchip" style="background-color: var(--surface)"></div>
            <div class = "paintchip" style="background-color: var(--onSurface)"></div>
            <div class = "paintchip" style="background-color: var(--error)"></div>
            <div class = "paintchip" style="background-color: var(--onError)"></div>

            <div class = "paintchip" style="background-color: var(--green)"></div>
            <div class = "paintchip" style="background-color: var(--onGreen)"></div>
            <div class = "paintchip" style="background-color: var(--yellow)"></div>
            <div class = "paintchip" style="background-color: var(--onYellow)"></div>
            <div class = "paintchip" style="background-color: var(--orange)"></div>
            <div class = "paintchip" style="background-color: var(--onOrange)"></div>
            <div class = "paintchip" style="background-color: var(--red)"></div>
            <div class = "paintchip" style="background-color: var(--onRed)"></div>
        </div>

        <h1 id = "test">value</h1>
        
        <div>
            <h1 id = "test2" contenteditable = "true">KEY</h1>
        </div>

        <button id = "testButton", onclick="viewModel.send()">Click me</button>

        <script type="text/javascript" src="viewModel.js"></script>
        <script type="text/javascript" src="model.js"></script>

    </body>
</html>
